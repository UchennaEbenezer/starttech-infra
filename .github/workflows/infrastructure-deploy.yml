name: Infrastructure Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/infrastructure-deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/infrastructure-deploy.yml'

jobs:
  terraform:
    name: Terraform Validate and Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Create tfvars from secrets
        run: |
          # Clean secret inputs by stripping any unexpected trailing newlines or carriage returns
          KEY_PAIR_NAME=$(echo "${{ secrets.KEY_PAIR_NAME }}" | xargs | tr -d '\r\n')
          MY_IP_ADDRESS=$(echo "${{ secrets.MY_IP_ADDRESS }}" | xargs | tr -d '\r\n')
          ENVIRONMENT=$(echo "${{ secrets.ENVIRONMENT || 'prod' }}" | xargs | tr -d '\r\n')
          AWS_REGION=$(echo "${{ secrets.AWS_REGION || 'us-east-1' }}" | xargs | tr -d '\r\n')

          echo "key_pair_name = \"$KEY_PAIR_NAME\"" > terraform.tfvars
          echo "my_ip_address = \"$MY_IP_ADDRESS\"" >> terraform.tfvars
          echo "environment = \"$ENVIRONMENT\"" >> terraform.tfvars
          echo "aws_region = \"$AWS_REGION\"" >> terraform.tfvars

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
